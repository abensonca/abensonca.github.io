<header class="site-nav" role="banner">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="nav-menu" class="nav-menu" aria-label="Primary">
      {% assign nav_items = site.data.navigation %}
      {% for item in nav_items %}
        {% assign current = false %}
        {% if page.url == item.url %}{% assign current = true %}{% endif %}
        <a class="nav-link{% if current %} is-active{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var menu = document.getElementById('nav-menu');
    if (!btn || !menu) return;
    btn.addEventListener('click', function () {
      var open = menu.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
