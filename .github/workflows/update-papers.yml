name: Update papers

on:
  schedule:
    # Sundays 06:13 UTC — off-peak for ADS and the GH Models free tier.
    - cron: "13 6 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: How many papers to keep
        default: "6"
        required: false

permissions:
  contents: write
  models: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: update-papers
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Refresh _data/papers.yml
        env:
          ADS_API_TOKEN: ${{ secrets.NASA_ADS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAPERS_LIMIT: ${{ inputs.limit || '6' }}
        run: python scripts/fetch_papers.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain _data/papers.yml assets/img/papers)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/papers.yml assets/img/papers
            git commit -m "chore: refresh papers from ADS"
            git push
          else
            echo "No paper changes."
          fi
