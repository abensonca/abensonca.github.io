name: Update affiliations

on:
  schedule:
    # First of the month, 07:11 UTC. ORCID profiles change rarely.
    - cron: "11 7 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: update-affiliations
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Refresh affiliations from ORCID
        run: python scripts/fetch_affiliations.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain _data/members.yml)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/members.yml
            git commit -m "chore: refresh ORCID affiliations"
            git push
          else
            echo "No affiliation changes."
          fi
