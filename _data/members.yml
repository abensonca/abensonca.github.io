#   current_affiliation   : Auto-managed for ORCID-equipped alumni. You may also
#                           edit by hand for those without ORCIDs.
#   affiliation_locked    : true to prevent the scheduled job from overwriting
#                           current_affiliation (e.g. if you want a custom value).

