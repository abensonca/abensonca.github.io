# Software / open-source projects shown on /code/.
# `featured: true` items get the larger card treatment.

- name: Galacticus
  featured: true
  description: >
    A semi-analytic model of galaxy formation. Tracks the assembly of dark matter
    halos, the cooling and accretion of gas, star formation and feedback, chemical
    evolution, mergers, and the environmental processes that act on satellite
    galaxies. Used by groups around the world; designed to be extensible to
    non-CDM physics, alternative cosmologies, and emission-line modelling.
  language: Fortran / Python
  role: Lead developer
  url: https://github.com/galacticusorg/galacticus
  docs: https://github.com/galacticusorg/galacticus/wiki
  image: /assets/img/colors.png

- name: Dendros
  description: >
    Companion analysis tooling for Galacticus — convergence diagnostics,
    posterior visualization, and helpers for emulator training.
  language: Python
  role: Lead developer
  url: https://github.com/galacticusorg/dendros
  docs: https://dendros.readthedocs.io/en/latest/index.html
  image: /assets/img/corner.png

- name: astrosylva
  description: >
    A Python library and CLI that converts halo merger-tree catalogues —
    Consistent-Trees, LHaloTree, SubLink, and AHF — into the Galacticus HDF5
    input format. A Python port of the original C utility rockstar2galacticus.
  language: Python
  role: Lead developer
  url: https://github.com/galacticusorg/astrosylva
  docs: https://astrosylva.readthedocs.io
  image: /assets/img/brownian_bridge.png
